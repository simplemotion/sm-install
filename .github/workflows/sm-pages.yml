name: sm-pages

# Build + deploy install.simplemotion.com via GitHub Actions Pages.
# The welcome page's interactive logic is authored in TypeScript
# (sm-welcome/sm-welcome.ts), bundled + minified by esbuild and inlined
# into the served HTML by sm-build.ts. No hand-written .js is committed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: sm-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Build _site (esbuild + inline)
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
