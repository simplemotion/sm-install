name: install-smoke-test

# Smoke test for the public installer: on each OS, install sm-welcome from
# the release channel via the generic installer and assert that (1) cosign
# provenance verifies and (2) the binary runs. Guards against regressions
# like the sm-ci signer-identity mismatch fixed in #31. Mode=install only —
# no interactive onboarding (that's sm-welcome.{sh,ps1}'s Section 3).

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC
  push:
    branches: [main]
    paths:
      - 'sm-install.sh'
      - 'sm-install.ps1'
      - 'sm-install-lib.sh'
      - 'sm-install-lib.ps1'
      - '.github/workflows/install-smoke-test.yml'

permissions:
  contents: read

env:
  PKG: sm-welcome
  SRC: 3400-0000-SM-Software/3400-0009-SM-Welcome
  CH: release
  # Authenticate the installer's api.github.com calls so shared-runner IPs
  # don't hit the 60/hr unauthenticated rate limit (the macOS flake).
  GH_TOKEN: ${{ github.token }}

jobs:
  windows-pwsh:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install + verify (PowerShell 7)
        shell: pwsh
        run: |
          $log = & ./sm-install.ps1 -Package $env:PKG -AssetSuffix short -SourceRepo $env:SRC -Channel $env:CH -Mode install *>&1
          $log | ForEach-Object { Write-Host $_ }
          if ($LASTEXITCODE -ne 0) { throw "installer exit $LASTEXITCODE" }
          if (-not ($log -join "`n" | Select-String -Quiet 'Provenance verified')) { throw 'provenance NOT verified' }
          & (Join-Path $HOME '.simplemotion/bin/sm-welcome.exe') -V
          if ($LASTEXITCODE -ne 0) { throw "binary -V exit $LASTEXITCODE" }

  windows-ps51:
    # Starts under Windows PowerShell 5.1; the ASCII pwsh-7 guard should find
    # pwsh 7 (preinstalled on the runner) and relaunch the install under it.
    # Assert via exit code + installed binary (the relaunch crosses a process
    # boundary, so the child's Write-Host output isn't captured here).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install (start in Windows PowerShell 5.1, relaunch to pwsh 7)
        shell: powershell
        run: |
          & ./sm-install.ps1 -Package $env:PKG -AssetSuffix short -SourceRepo $env:SRC -Channel $env:CH -Mode install
          if ($LASTEXITCODE -ne 0) { throw "installer exit $LASTEXITCODE" }
          $bin = Join-Path $HOME '.simplemotion/bin/sm-welcome.exe'
          if (-not (Test-Path $bin)) { throw "sm-welcome.exe not installed at $bin" }
          & $bin -V
          if ($LASTEXITCODE -ne 0) { throw "binary -V exit $LASTEXITCODE" }

  unix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install + verify (bash)
        shell: bash
        run: |
          set -euo pipefail
          log=$(bash sm-install.sh --package "$PKG" --asset-suffix short --source-repo "$SRC" --channel "$CH" --mode install 2>&1) || { echo "$log"; exit 1; }
          echo "$log"
          echo "$log" | grep -q 'Provenance verified' || { echo 'provenance NOT verified' >&2; exit 1; }
          "$HOME/.simplemotion/bin/sm-welcome" -V
